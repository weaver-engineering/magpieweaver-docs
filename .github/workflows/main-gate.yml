# The Main Gate action validates the contents of the commit history for:
# - Requires title of latest commit to start with `[{ref}]`
# - Requires the description of the commit to be present

name: MainGate

on:
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  validate-commit:
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate latest commit message
        run: |
          set -euo pipefail
          echo "Checking latest commit message starts with task reference and includes a description..."
          # For pull requests, get the head commit (your actual commit), not the merge commit
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            commit_sha="${{ github.event.pull_request.head.sha }}"
          else
            commit_sha="HEAD"
          fi
          commit_message="$(git log -1 --pretty=%B "$commit_sha")"
          first_line="$(printf '%s' "$commit_message" | head -n1)"
          commit_body="$(printf '%s' "$commit_message" | tail -n +2 | sed '/^[[:space:]]*$/d')"
          echo "Latest commit title: $first_line"
          if [[ ! "$first_line" =~ ^[A-Z]+-[0-9]+ ]]; then
            echo "Error: commit title must start with task reference e.g. MAG-30"
            echo "Received: $first_line"
            exit 1
          fi
          if [[ -z "$commit_body" ]]; then
            echo "Error: commit message must include a description after the title."
            echo "Commit body was empty."
            exit 1
          fi
          echo "Commit title and description are valid."
